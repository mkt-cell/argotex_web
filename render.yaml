databases:
  - name: argotex-db
    plan: free
    postgresMajorVersion: 15

services:
  - type: web
    name: argotex-cms
    runtime: image
    image:
      url: docker.io/directus/directus:10.11
    plan: free
    envVars:
      - key: KEY
        generateValue: true
      - key: SECRET
        generateValue: true
      - key: DB_CLIENT
        value: pg
      - key: DB_HOST
        fromDatabase:
          name: argotex-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: argotex-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: argotex-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: argotex-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: argotex-db
          property: password
      - key: ADMIN_EMAIL
        value: admin@argotex.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: PUBLIC_URL
        sync: false
    healthCheckPath: /server/health
